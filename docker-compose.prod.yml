version: "3.9"

# Production docker-compose — no source mounts, no hot-reload, resource limits.
# Usage:
#   docker compose -f docker-compose.prod.yml up -d
#
# Required environment variables (set via .env or shell):
#   DATABASE_URL, REDIS_URL, SENTINEL_API_KEY, SENTINEL_CORS_ORIGINS
#   GEMINI_API_KEY (or OPENAI_API_KEY / ANTHROPIC_API_KEY)

services:

  api:
    build:
      context: .
      dockerfile: docker/Dockerfile.api
    image: sentinellm/api:latest
    ports:
      - "8000:8000"
    volumes:
      - model-cache:/home/sentinel/.cache
    environment:
      - DATABASE_URL=${DATABASE_URL}
      - REDIS_URL=${REDIS_URL}
      - SENTINEL_CONFIG_PATH=/app/config.yaml
      - SENTINEL_ENV=production
      - SENTINEL_API_KEY=${SENTINEL_API_KEY}
      - SENTINEL_CORS_ORIGINS=${SENTINEL_CORS_ORIGINS:-http://localhost:3000}
      - GEMINI_API_KEY=${GEMINI_API_KEY:-}
      - OPENAI_API_KEY=${OPENAI_API_KEY:-}
      - ANTHROPIC_API_KEY=${ANTHROPIC_API_KEY:-}
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
    restart: unless-stopped
    deploy:
      resources:
        limits:
          cpus: "2.0"
          memory: 4G
        reservations:
          cpus: "0.5"
          memory: 1G
    # Uvicorn: single worker (model state is process-local; use replicas for scale)
    command: >
      uvicorn sentinel.main:app
      --host 0.0.0.0
      --port 8000
      --workers 1
      --log-level warning
      --access-log
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8000/health"]
      interval: 30s
      timeout: 10s
      start_period: 60s
      retries: 3

  dashboard:
    build:
      context: ./dashboard
      dockerfile: ../docker/Dockerfile.dashboard
    image: sentinellm/dashboard:latest
    ports:
      - "3000:3000"
    environment:
      - NEXT_PUBLIC_API_URL=${NEXT_PUBLIC_API_URL:-http://api:8000}
      - NEXT_PUBLIC_WS_URL=${NEXT_PUBLIC_WS_URL:-ws://api:8000}
    depends_on:
      - api
    restart: unless-stopped
    deploy:
      resources:
        limits:
          cpus: "0.5"
          memory: 512M

  postgres:
    image: postgres:15-alpine
    environment:
      POSTGRES_USER: ${POSTGRES_USER:-sentinel}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:?POSTGRES_PASSWORD is required}
      POSTGRES_DB: sentinellm
    ports:
      - "127.0.0.1:5432:5432"    # bind to loopback only in production
    volumes:
      - postgres-data:/var/lib/postgresql/data
      - ./sentinel/storage/schema.sql:/docker-entrypoint-initdb.d/schema.sql
    restart: unless-stopped
    deploy:
      resources:
        limits:
          cpus: "1.0"
          memory: 1G
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER:-sentinel} -d sentinellm"]
      interval: 10s
      timeout: 5s
      retries: 5

  redis:
    image: redis:7-alpine
    ports:
      - "127.0.0.1:6379:6379"    # bind to loopback only in production
    volumes:
      - redis-data:/data
    command: redis-server --save 60 1 --loglevel warning
    restart: unless-stopped
    deploy:
      resources:
        limits:
          cpus: "0.25"
          memory: 256M
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 10s
      timeout: 3s
      retries: 5

volumes:
  postgres-data:
  redis-data:
  model-cache:
